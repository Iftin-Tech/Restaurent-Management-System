{% load static %}
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-8 mb-8 lg:mb-12">
    <div class="bg-gradient-to-br from-indigo-50 to-white px-4 lg:px-8 py-5 lg:py-6 rounded-2xl shadow-sm border border-indigo-100 hover:shadow-md transition">
        <h3 class="text-indigo-800 text-xs font-black uppercase tracking-widest mb-2 lg:mb-3">Total Registered Clients</h3>
        <p class="text-4xl lg:text-5xl font-black text-indigo-600">{{ total_restaurants }} <span class="text-sm font-semibold text-indigo-400">restaurants</span></p>
    </div>
    <div class="bg-gradient-to-br from-green-50 to-white px-4 lg:px-8 py-5 lg:py-6 rounded-2xl shadow-sm border border-green-100 hover:shadow-md transition">
        <h3 class="text-green-800 text-xs font-black uppercase tracking-widest mb-2 lg:mb-3">Active (Live)</h3>
        <p class="text-4xl lg:text-5xl font-black text-green-500">{{ active_restaurants }} <span class="text-sm font-semibold text-green-400">instances</span></p>
    </div>
    <div class="bg-gradient-to-br from-red-50 to-white px-4 lg:px-8 py-5 lg:py-6 rounded-2xl shadow-sm border border-red-100 hover:shadow-md transition">
        <h3 class="text-red-800 text-xs font-black uppercase tracking-widest mb-2 lg:mb-3">Inactive / Suspended</h3>
        <p class="text-4xl lg:text-5xl font-black text-red-500">{{ inactive_restaurants }} <span class="text-sm font-semibold text-red-400">instances</span></p>
    </div>
</div>
