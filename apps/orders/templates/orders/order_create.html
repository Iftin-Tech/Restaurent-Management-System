{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Create New Billed Order</h2>
        
        <form method="POST" id="orderForm">
            {% csrf_token %}
            
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Table Number (Optional)</label>
                    {{ order_form.table_number }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Order Notes (Optional)</label>
                    {{ order_form.notes }}
                </div>
            </div>

            <div class="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h3 class="text-lg font-semibold mb-3">Order Items</h3>
                {{ formset.management_form }}
                
                <div id="formset-container" class="space-y-4">
                    {% for form in formset %}
                    <div class="item-form flex gap-4 items-center bg-white p-4 rounded shadow-sm border border-gray-100">
                        <div class="flex-1">
                            <label class="block text-xs text-gray-500 uppercase font-semibold mb-1">Item</label>
                            {{ form.menu_item }}
                            {{ form.id }}
                        </div>
                        <div class="w-32">
                            <label class="block text-xs text-gray-500 uppercase font-semibold mb-1">Qty</label>
                            {{ form.quantity }}
                        </div>
                    </div>
                    {% endfor %}
                </div>
                
                <button type="button" id="add-item-btn" class="mt-4 inline-flex items-center text-blue-600 hover:text-blue-800 font-medium text-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Another Item
                </button>
            </div>

            <div class="flex justify-end pt-4 border-t">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 transition duration-150 text-white font-bold py-3 px-8 rounded flex items-center shadow">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Save Order & Print Receipt
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
