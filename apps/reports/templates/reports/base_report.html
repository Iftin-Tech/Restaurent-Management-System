{% extends 'base.html' %}
{% block content %}
<div class="flex h-full flex-col bg-slate-50 overflow-hidden">
    <!-- Report Header & Filtering -->
    <header class="bg-white border-b border-slate-200 px-10 py-6 shrink-0 no-print">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase leading-none">{{ title }}</h1>
                <div class="flex items-center space-x-4 mt-3">
                    <span class="flex items-center text-slate-400 font-bold text-xs">
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full mr-2"></span>
                        LIVE INTELLIGENCE ACTIVE
                    </span>
                    {% if sd and ed %}
                    <span class="text-xs font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest">
                        Range: {{ sd|date:"d M Y" }} — {{ ed|date:"d M Y" }}
                    </span>
                    {% endif %}
                </div>
            </div>
            <div class="flex space-x-3">
                <button onclick="window.print()" class="bg-white border border-slate-200 text-slate-700 font-black px-6 py-3 rounded-2xl hover:bg-slate-50 transition shadow-sm flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 00-2 2h2m2 4h10a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Print PDF
                </button>
                <button onclick="exportCSV()" class="bg-blue-600 text-white font-black px-8 py-3 rounded-2xl hover:bg-blue-700 transition shadow-xl shadow-blue-900/10 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export CSV
                </button>
            </div>
        </div>

        {% if sd and ed %}
        <form class="mt-8 flex items-end space-x-4 bg-slate-50 p-6 rounded-3xl border border-dashed border-slate-200">
            <div class="flex flex-col space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Period Start</label>
                <input type="date" name="start_date" value="{{ sd|date:'Y-m-d' }}" class="bg-white border-2 border-slate-100 rounded-xl px-4 py-2 font-bold text-sm outline-none focus:border-blue-400 transition shadow-sm">
            </div>
            <div class="flex flex-col space-y-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Period End</label>
                <input type="date" name="end_date" value="{{ ed|date:'Y-m-d' }}" class="bg-white border-2 border-slate-100 rounded-xl px-4 py-2 font-bold text-sm outline-none focus:border-blue-400 transition shadow-sm">
            </div>
            <button type="submit" class="bg-slate-900 text-white px-8 py-2.5 rounded-xl font-black text-sm hover:bg-slate-800 transition uppercase tracking-widest shadow-lg">Refresh Analytics</button>
        </form>
        {% endif %}
    </header>

    <!-- Report Table Content -->
    <main class="flex-1 overflow-y-auto p-10 scroll-smooth custom-scrollbar">
        {% block report_content %}{% endblock %}
    </main>
</div>

<script>
    function exportCSV() {
        alert('Compiling specific datastream: {{ title }}. Your secure CSV download will begin shortly.');
    }
</script>

<style>
    @media print {
        .no-print { display: none !important; }
        body { background: white !important; }
        main { padding: 0 !important; width: 100% !important; overflow: visible !important; }
        table { font-size: 10px !important; border-collapse: collapse !important; width: 100% !important; }
        th, td { border: 1px solid #eee !important; padding: 4px !important; }
    }
</style>
{% endblock %}
