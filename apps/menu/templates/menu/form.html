{% extends 'base.html' %}
{% block content %}
<div class="page-shell max-w-2xl">
    <div class="max-w-md mx-auto bg-white p-5 sm:p-6 rounded-2xl shadow mt-4 lg:mt-10 border border-slate-200">
    <h2 class="text-xl font-bold mb-6">{{ title }}</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            {{ form.as_p }}
        </div>
        <div class="mt-6 flex flex-col-reverse sm:flex-row justify-end gap-3">
            <a href="{% url 'menu:menu_list' %}" class="bg-gray-400 text-white px-4 py-3 rounded-xl hover:bg-gray-500 text-center font-bold">Cancel</a>
            <button type="submit" class="bg-blue-600 text-white px-4 py-3 rounded-xl hover:bg-blue-700 font-bold">Save</button>
        </div>
    </form>
</div>
</div>
{% endblock %}
