{% extends 'base.html' %}
{% block content %}
<div class="px-6 py-4">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Menu Management</h1>
        <div>
            <a href="{% url 'menu:category_create' %}" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">Add Category</a>
            <a href="{% url 'menu:item_create' %}" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 transition ml-2">Add Item</a>
        </div>
    </div>

    <div class="bg-white rounded shadow p-4">
        <table id="menuTable" class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-100 border-b">
                    <th class="p-4">Item Name</th>
                    <th class="p-4">Category</th>
                    <th class="p-4">Price</th>
                    <th class="p-4">Status</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4">{{ item.name }}</td>
                    <td class="p-4">{{ item.category.name }}</td>
                    <td class="p-4">${{ item.price }}</td>
                    <td class="p-4">
                        {% if item.is_active %}
                        <span class="bg-green-100 text-green-800 text-sm px-2 py-1 rounded">Active</span>
                        {% else %}
                        <span class="bg-red-100 text-red-800 text-sm px-2 py-1 rounded">Inactive</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Assuming DataTables is loaded in base.html -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if($.fn.DataTable) {
            $('#menuTable').DataTable({
                responsive: true
            });
        }
    });
</script>
{% endblock %}
